syntax = "proto3";

import "google/protobuf/timestamp.proto";

message Date {
  // Year of the date. Must be from 1 to 9999, or 0 to specify a date without
  // a year.
  uint32 year = 1;

  // Month of a year. Must be from 1 to 12, or 0 to specify a year without a
  // month and day.
  uint32 month = 2;

  // Day of a month. Must be from 1 to 31 and valid for the year and month, or 0
  // to specify a year by itself or a year and month where the day isn't
  // significant.
  uint32 day = 3;
}

message BoothEventKey {
  string id = 1;
}

message BoothEvent {
  BoothEventKey key = 1;
  string description = 2;
  Date date = 3;
  float participation_fee = 4;
  float sales_fee = 5;
  bool closed = 6;
  google.protobuf.Timestamp closed_on = 7;
}

message VendorKey {
  BoothEventKey event = 1;
  uint32 id = 2;
}

message Vendor {
  VendorKey key = 1;
}

message PurchaseItemKey {
  VendorKey vendor = 1;
  string id = 2;
}

message PurchaseItem {
  PurchaseItemKey key = 1;
  float price = 2;
}

message PurchaseKey {
  BoothEventKey event = 1;
  string id = 2;
}

message Purchase {
  PurchaseKey key = 1;
  repeated PurchaseItem items = 2;
  float value = 3;
  google.protobuf.Timestamp purchased_on = 4;
}