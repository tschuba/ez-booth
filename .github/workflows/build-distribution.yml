name: Build EZ-Booth Distribution

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS Distribution
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Fetch main branch for Spotless
        run: git fetch origin main:main

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean install -Pdist,production --file pom.xml

      - name: Verify distribution artifacts
        run: |
          ls -la distribution/target/
          test -f distribution/target/ez-booth-1.0.0.zip

      - name: Upload macOS Distribution
        uses: actions/upload-artifact@v4
        with:
          name: ez-booth-macos-suite
          path: distribution/target/ez-booth-1.0.0.zip
          retention-days: 30
          if-no-files-found: error

  build-windows:
    name: Build Windows Distribution
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Fetch main branch for Spotless
        run: git fetch origin main:main

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean install "-Pdist,production" --file pom.xml

      - name: Verify distribution artifacts
        run: |
          dir distribution\target\
          if (-Not (Test-Path distribution\target\ez-booth-1.0.0.zip)) { exit 1 }
        shell: pwsh

      - name: Upload Windows Distribution
        uses: actions/upload-artifact@v4
        with:
          name: ez-booth-windows-suite
          path: distribution/target/ez-booth-1.0.0.zip
          retention-days: 30
          if-no-files-found: error

  create-release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ez-booth-macos-suite
          path: ./artifacts/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ez-booth-windows-suite
          path: ./artifacts/windows

      - name: Rename artifacts for release
        run: |
          mv ./artifacts/macos/ez-booth-1.0.0.zip ./ez-booth-${{ github.ref_name }}-macos.zip
          mv ./artifacts/windows/ez-booth-1.0.0.zip ./ez-booth-${{ github.ref_name }}-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ez-booth-${{ github.ref_name }}-macos.zip
            ez-booth-${{ github.ref_name }}-windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}






