syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "core.proto";

option java_package = "tschuba.ez.booth.proto";
option java_outer_classname = "ProtoModel";

message BoothKey {
  string boothId = 1;
}

message Booth {
  BoothKey key = 1;
  string description = 2;
  Date date = 3;
  float participation_fee = 4;
  float sales_fee = 5;
  float fees_rounding_step = 6;
  bool closed = 7;
  google.protobuf.Timestamp closed_on = 8;
}

message VendorKey {
  BoothKey booth = 1;
  string vendorId = 2;
}

message Vendor {
  VendorKey key = 1;
}

message PurchaseItem {
  float price = 2;
  google.protobuf.Timestamp purchased_on = 3;
}

message PurchaseKey {
  BoothKey booth = 1;
  string purchaseId = 2;
}

message Purchase {
  PurchaseKey key = 1;
  repeated PurchaseItem items = 2;
  float value = 3;
  google.protobuf.Timestamp purchased_on = 4;
}