syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "core.proto";

message BoothEventKey {
  string id = 1;
}

message BoothEvent {
  BoothEventKey key = 1;
  string description = 2;
  Date date = 3;
  float participation_fee = 4;
  float sales_fee = 5;
  float fees_rounding_step = 6;
  bool closed = 7;
  google.protobuf.Timestamp closed_on = 8;
}

message VendorKey {
  BoothEventKey event = 1;
  uint32 id = 2;
}

message Vendor {
  VendorKey key = 1;
}

message PurchaseItemKey {
  VendorKey vendor = 1;
  string id = 2;
}

message PurchaseItem {
  PurchaseItemKey key = 1;
  float price = 2;
  google.protobuf.Timestamp purchased_on = 3;
}

message PurchaseKey {
  BoothEventKey event = 1;
  string id = 2;
}

message Purchase {
  PurchaseKey key = 1;
  repeated PurchaseItem items = 2;
  float value = 3;
  google.protobuf.Timestamp purchased_on = 4;
}