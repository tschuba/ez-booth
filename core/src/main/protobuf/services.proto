syntax = "proto3";

import "google/protobuf/empty.proto";
import "core.proto";
import "model.proto";

option java_package = "tschuba.ez.booth.proto";
option java_outer_classname = "ProtoServices";

message CheckoutInput {
  BoothKey booth = 1;
  repeated PurchaseItem items = 2;
  bool print_receipt = 3;
}

service BoothService {
  rpc SaveBooth(Booth) returns (google.protobuf.Empty);
  rpc GetAllBooths(google.protobuf.Empty) returns (stream Booth);
  rpc GetBooth(BoothKey) returns (Booth);
  rpc CloseBooth(BoothKey) returns (Booth);
  rpc OpenBooth(BoothKey) returns (Booth);
  rpc DeleteBooth(BoothKey) returns (google.protobuf.Empty);
}

service PurchaseService {
  rpc Checkout(CheckoutInput) returns (Purchase);
  rpc GetPurchaseByKey(PurchaseKey) returns (Purchase);
  rpc GetPurchasesByBooth(BoothKey) returns (stream Purchase);
}

message ChargedFees {
  double participation_fee = 1;
  double sales_fee = 2;
}

message ChargingConfig {
  float participation_fee = 1;
  float sales_fee = 2;
  float rounding_step = 3;
}

message BalanceInput {
  float total_sales_amount = 1;
  ChargingConfig charging_config = 2;
}

message SalesBalance {
  double total_revenue = 1;
  ChargedFees fees = 2;
}

service ChargingService {
  rpc CalculateFees(VendorKey) returns (ChargedFees);
  rpc CalculateBalance(BalanceInput) returns (SalesBalance);
}

message VendorReportData {
  Vendor vendor = 1;
  Booth booth = 2;
  repeated PurchaseItem items = 3;
  float sales_sum = 4;
  float participation_fee = 5;
  float sales_fee = 6;
  float total_revenue = 7;
}

message VendorReportInput {
  repeated VendorKey vendor = 1;
}

service ReportingService {
  rpc CreateVendorReportData(VendorKey) returns (VendorReportData);
  rpc GenerateVendorReport(VendorReportInput) returns (URI);
}